AWSTemplateFormatVersion: "2010-09-09"

# ==========================================================================
#  Clase 4 - Observabilidad de contenedores (ECS + Fargate)
#  Laboratorio: cluster ECS con un servicio Fargate, Container Insights
#  (enhanced observability) habilitado y logs ruteados con FireLens
#  (Fluent Bit) hacia CloudWatch Logs.
#
#  Flujo que despliega esta plantilla:
#    (1) VPC minima single-AZ con una subred publica (sin NAT: la tarea sale
#        a Internet por Internet Gateway para bajar las imagenes publicas).
#    (2) Cluster ECS con Container Insights en modo "enhanced" (metricas a
#        nivel de cluster, servicio, tarea y contenedor).
#    (3) Task definition Fargate con dos contenedores:
#          - app: contenedor de aplicacion de ejemplo (httpd) que ademas
#            imprime lineas a stdout de forma periodica (algo para loguear).
#          - log_router: sidecar FireLens (Fluent Bit) que captura la salida
#            de 'app' y la rutea a CloudWatch Logs.
#    (4) Servicio ECS que mantiene 1 tarea corriendo en Fargate.
#    (5) Roles IAM: execution role (pull de imagen + logs) y task role
#        (permisos de la app; minimos).
#
#  Objetivo de costo: < USD 1 si se limpia al terminar (1 tarea Fargate
#  chica corriendo solo durante el laboratorio; Container Insights enhanced
#  factura por observaciones, mantenerlo pocas horas).
# ==========================================================================

Description: >-
  Clase 4 - Observabilidad de contenedores sobre Amazon ECS + AWS Fargate:
  cluster con Container Insights (enhanced), servicio Fargate con un contenedor
  de aplicacion de ejemplo y un sidecar FireLens (Fluent Bit) que rutea los logs
  a CloudWatch Logs. Metricas por tarea/contenedor correlacionadas con los logs.
  Todo como codigo, de bajo costo y borrable.

# --------------------------------------------------------------------------
#  Metadata: agrupa y ordena los parametros en la consola de CloudFormation.
# --------------------------------------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Configuracion general del laboratorio
        Parameters:
          - NombrePrefijo
          - CidrVpc
          - CidrSubred
      - Label:
          default: Contenedor y observabilidad
        Parameters:
          - ImagenApp
          - ImagenFluentBit
          - DiasRetencionLogs
    ParameterLabels:
      NombrePrefijo:
        default: Prefijo de nombres de recursos
      CidrVpc:
        default: CIDR de la VPC
      CidrSubred:
        default: CIDR de la subred publica
      ImagenApp:
        default: Imagen del contenedor de aplicacion
      ImagenFluentBit:
        default: Imagen del sidecar FireLens (Fluent Bit)
      DiasRetencionLogs:
        default: Retencion de los log groups (dias)

# --------------------------------------------------------------------------
#  Parametros: nada hardcodeado. Las imagenes son publicas y parametrizables.
#  (Este lab no usa EC2/AMI: Fargate no expone el host, por eso no hay
#   parametro de AMI. Fargate ejecuta la tarea sin instancias que administrar.)
# --------------------------------------------------------------------------
Parameters:
  NombrePrefijo:
    Type: String
    Default: obs-clase4
    Description: >-
      Prefijo para nombrar los recursos. Minusculas, numeros y guiones,
      empezando por letra.
    AllowedPattern: "^[a-z][a-z0-9-]{2,20}$"
    ConstraintDescription: >-
      Entre 3 y 21 caracteres: minusculas, numeros y guiones, empezando por letra.

  CidrVpc:
    Type: String
    Default: 10.40.0.0/16
    Description: Rango CIDR de la VPC del laboratorio.
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"

  CidrSubred:
    Type: String
    Default: 10.40.1.0/24
    Description: Rango CIDR de la subred publica (single-AZ).
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"

  ImagenApp:
    Type: String
    Default: public.ecr.aws/docker/library/httpd:2.4
    Description: >-
      Imagen del contenedor de aplicacion de ejemplo. Por defecto httpd desde
      la galeria publica de Amazon ECR (no requiere credenciales).

  ImagenFluentBit:
    Type: String
    Default: public.ecr.aws/aws-observability/aws-for-fluent-bit:stable
    Description: >-
      Imagen del sidecar FireLens (AWS for Fluent Bit) usada como log router.

  DiasRetencionLogs:
    Type: Number
    Default: 3
    AllowedValues: [1, 3, 5, 7, 14, 30]
    Description: Retencion de los log groups de la aplicacion (dias).

Resources:

  # ======================================================================
  #  1) RED - VPC minima single-AZ con una subred publica
  #     La tarea Fargate corre con IP publica y sale por el Internet
  #     Gateway para bajar las imagenes publicas (sin NAT Gateway, que
  #     tendria costo por hora).
  # ======================================================================
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref CidrVpc
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${NombrePrefijo}-vpc"
        - Key: Project
          Value: observabilidad-monitoreo-aws
        - Key: Clase
          Value: "4"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${NombrePrefijo}-igw"
        - Key: Project
          Value: observabilidad-monitoreo-aws
        - Key: Clase
          Value: "4"

  AsociacionIgw:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # Subred publica en la primera AZ de la region (single-AZ para minimizar costo).
  SubredPublica:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref CidrSubred
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NombrePrefijo}-subred-publica"
        - Key: Project
          Value: observabilidad-monitoreo-aws
        - Key: Clase
          Value: "4"

  TablaRuteo:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NombrePrefijo}-rt-publica"
        - Key: Project
          Value: observabilidad-monitoreo-aws
        - Key: Clase
          Value: "4"

  # Ruta por defecto hacia Internet (necesaria para bajar las imagenes).
  RutaInternet:
    Type: AWS::EC2::Route
    DependsOn: AsociacionIgw
    Properties:
      RouteTableId: !Ref TablaRuteo
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  AsociacionTablaRuteo:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubredPublica
      RouteTableId: !Ref TablaRuteo

  # Security group de la tarea: sin ingress (la app no se expone), solo egress.
  SgTarea:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: >-
        SG de la tarea Fargate. Sin ingress: la app no se publica; solo se
        observa por metricas y logs. Egress abierto para bajar imagenes.
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Salida a Internet para pull de imagenes y envio de logs.
      Tags:
        - Key: Name
          Value: !Sub "${NombrePrefijo}-sg-tarea"
        - Key: Project
          Value: observabilidad-monitoreo-aws
        - Key: Clase
          Value: "4"

  # ======================================================================
  #  2) CLUSTER ECS con Container Insights ENHANCED
  #     ClusterSettings containerInsights = "enhanced" habilita las metricas
  #     detalladas a nivel de cluster, servicio, tarea y contenedor, junto
  #     con el seguimiento de despliegues (deployment tracking).
  # ======================================================================
  ClusterEcs:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${NombrePrefijo}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enhanced
      Tags:
        - Key: Project
          Value: observabilidad-monitoreo-aws
        - Key: Clase
          Value: "4"

  # ======================================================================
  #  3) LOG GROUPS
  #     - LogGroupApp: destino final de los logs de la app (los escribe
  #       FireLens/Fluent Bit).
  #     - LogGroupFirelis: log propio del sidecar Fluent Bit (diagnostico
  #       del router). Se crea con log driver awslogs del sidecar.
  # ======================================================================
  LogGroupApp:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/${NombrePrefijo}/app"
      RetentionInDays: !Ref DiasRetencionLogs
      Tags:
        - Key: Project
          Value: observabilidad-monitoreo-aws
        - Key: Clase
          Value: "4"

  LogGroupFirelis:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/${NombrePrefijo}/firelens"
      RetentionInDays: !Ref DiasRetencionLogs
      Tags:
        - Key: Project
          Value: observabilidad-monitoreo-aws
        - Key: Clase
          Value: "4"

  # ======================================================================
  #  4) IAM - Execution role (lo asume el agente de ECS/Fargate)
  #     Permite: pull de la imagen, crear log streams y escribir logs.
  #     Managed policy AmazonECSTaskExecutionRolePolicy = minimo estandar.
  #     Se agrega inline para permitir a Fluent Bit crear/escribir en el
  #     log group de la app.
  # ======================================================================
  RolEjecucion:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NombrePrefijo}-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"
      Tags:
        - Key: Project
          Value: observabilidad-monitoreo-aws
        - Key: Clase
          Value: "4"

  # ======================================================================
  #  5) IAM - Task role (rol de la aplicacion dentro de la tarea)
  #     FireLens/Fluent Bit corre dentro de la tarea y usa este rol para
  #     escribir en CloudWatch Logs. Minimo: solo el log group de la app.
  # ======================================================================
  RolTarea:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NombrePrefijo}-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: firelens-a-cloudwatch-logs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Fluent Bit crea el log stream y escribe los eventos de la app.
              - Sid: EscribirLogsApp
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:CreateLogGroup
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource:
                  - !GetAtt LogGroupApp.Arn
                  - !Sub "${LogGroupApp.Arn}:*"
      Tags:
        - Key: Project
          Value: observabilidad-monitoreo-aws
        - Key: Clase
          Value: "4"

  # ======================================================================
  #  6) TASK DEFINITION Fargate (dos contenedores)
  #     - log_router: sidecar FireLens (Fluent Bit). FirelensConfiguration
  #       type=fluentbit. Es el que rutea los logs de la app a CloudWatch.
  #     - app: contenedor de aplicacion. Su logConfiguration usa el driver
  #       'awsfirelens', por eso su stdout/stderr va al sidecar FireLens,
  #       que lo entrega a CloudWatch Logs (log group de la app).
  #     RequiresCompatibilities FARGATE + networkMode awsvpc.
  #     CPU/mem chicos (256/512) para minimizar costo.
  # ======================================================================
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${NombrePrefijo}-app"
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: "256"
      Memory: "512"
      ExecutionRoleArn: !GetAtt RolEjecucion.Arn
      TaskRoleArn: !GetAtt RolTarea.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        # ---- Sidecar FireLens (Fluent Bit) como log router ----
        - Name: log_router
          Image: !Ref ImagenFluentBit
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              # enable-ecs-log-metadata agrega metadatos de ECS (cluster,
              # task ARN, etc.) a cada registro para poder correlacionar.
              enable-ecs-log-metadata: "true"
          # El propio Fluent Bit loguea su diagnostico via awslogs.
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroupFirelis
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens
          # Recursos minimos para el sidecar (limita el consumo del router).
          MemoryReservation: 64
        # ---- Contenedor de aplicacion de ejemplo ----
        - Name: app
          Image: !Ref ImagenApp
          Essential: true
          # Comando: levanta httpd en background e imprime a stdout una linea
          # periodica (nivel INFO y, cada tanto, WARN) para tener logs que
          # ver correlacionados con las metricas de CPU/memoria.
          EntryPoint:
            - /bin/sh
            - -c
          Command:
            - >-
              httpd -k start;
              i=0;
              while true; do
                i=$((i+1));
                if [ $((i % 10)) -eq 0 ]; then
                  echo "{\"level\":\"WARN\",\"seq\":$i,\"msg\":\"latencia elevada simulada\"}";
                else
                  echo "{\"level\":\"INFO\",\"seq\":$i,\"msg\":\"peticion procesada\"}";
                fi;
                sleep 5;
              done
          # Log driver awsfirelens: manda los logs al sidecar FireLens, que
          # los entrega a CloudWatch Logs con estas Options de salida.
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: cloudwatch_logs
              region: !Ref AWS::Region
              log_group_name: !Ref LogGroupApp
              log_stream_prefix: app-
              auto_create_group: "false"
      Tags:
        - Key: Project
          Value: observabilidad-monitoreo-aws
        - Key: Clase
          Value: "4"

  # ======================================================================
  #  7) SERVICIO ECS - mantiene 1 tarea Fargate corriendo
  #     LaunchType FARGATE, red awsvpc con IP publica (para el pull de
  #     imagenes sin NAT). DesiredCount 1 para bajo costo.
  # ======================================================================
  Servicio:
    Type: AWS::ECS::Service
    # Espera a que exista la ruta a Internet antes de arrancar la tarea.
    DependsOn: RutaInternet
    Properties:
      ServiceName: !Sub "${NombrePrefijo}-svc"
      Cluster: !Ref ClusterEcs
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      # Habilita Container Insights a capturar metricas del servicio/deploy.
      EnableECSManagedTags: true
      PropagateTags: SERVICE
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref SubredPublica
          SecurityGroups:
            - !Ref SgTarea
      Tags:
        - Key: Project
          Value: observabilidad-monitoreo-aws
        - Key: Clase
          Value: "4"

# --------------------------------------------------------------------------
#  Outputs: nombres de recursos y comandos utiles para verificar y explorar.
# --------------------------------------------------------------------------
Outputs:
  ClusterNombre:
    Description: Nombre del cluster ECS (con Container Insights enhanced).
    Value: !Ref ClusterEcs

  ServicioNombre:
    Description: Nombre del servicio ECS.
    Value: !GetAtt Servicio.Name

  TaskDefinitionArn:
    Description: ARN de la task definition Fargate.
    Value: !Ref TaskDefinition

  LogGroupAppNombre:
    Description: Log group donde FireLens entrega los logs de la app.
    Value: !Ref LogGroupApp

  LogGroupFirelisNombre:
    Description: Log group de diagnostico del sidecar Fluent Bit.
    Value: !Ref LogGroupFirelis

  VerServicioCLI:
    Description: Ver el estado del servicio y la cantidad de tareas corriendo.
    Value: !Sub >-
      aws ecs describe-services --cluster ${ClusterEcs} --services ${Servicio.Name}
      --query "services[0].{status:status,running:runningCount,desired:desiredCount}"
      --region ${AWS::Region}

  VerLogsCLI:
    Description: Seguir en vivo los logs de la app entregados por FireLens.
    Value: !Sub "aws logs tail /${NombrePrefijo}/app --follow --region ${AWS::Region}"

  ConsolaContainerInsights:
    Description: Enlace a Container Insights del cluster en la consola de CloudWatch.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#container-insights:performance/ECS:Cluster?~(query~(controls~(CW*3a*3aECS.cluster~(~'${ClusterEcs}))))"
